name: SonarCloud Analysis

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    environment: SonarQube
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        continue-on-error: true
        with:
          args: -Dsonar.branch.name=main
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Post issues to GitHub Issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONARQUBE }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          gh label create "sonarcloud-report" --color "0075ca" \
            --description "Rapport SonarCloud automatique" 2>/dev/null || true

          # Attendre que SonarCloud indexe les resultats
          sleep 120

          curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?organization=matthieupinceel&componentKeys=MatthieuPinceel_MonCatalogue&resolved=false&ps=100&s=SEVERITY&asc=false" \
            > /tmp/sonar_issues.json

          python3 -c "import json; d=json.load(open('/tmp/sonar_issues.json')); print('Total issues:', d.get('total',0), '| Errors:', d.get('errors',[]))"

          cat > /tmp/format_sonar.py << 'PYEOF'
          import sys, json, datetime, os
          with open('/tmp/sonar_issues.json') as f:
              data = json.load(f)
          issues = data.get('issues', [])
          total = data.get('total', 0)
          now = datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          sha = os.environ.get('COMMIT_SHA', '?')[:8]
          branch = os.environ.get('BRANCH_NAME', '?')
          lines = [
              '## Rapport SonarCloud -- ' + now,
              '**Branche :** `' + branch + '` | **Commit :** `' + sha + '`',
              '**' + str(total) + ' issue(s) non resolu(s)**',
              '',
          ]
          sev_order = ['BLOCKER', 'CRITICAL', 'MAJOR', 'MINOR', 'INFO']
          by_sev = {}
          for i in issues:
              s = i.get('severity', '?')
              by_sev.setdefault(s, []).append(i)
          labels = {
              'BLOCKER': 'BLOQUANT', 'CRITICAL': 'CRITIQUE',
              'MAJOR': 'MAJEUR', 'MINOR': 'MINEUR', 'INFO': 'INFO'
          }
          for sev in sev_order:
              grp = by_sev.get(sev, [])
              if not grp:
                  continue
              lines.append('### ' + labels.get(sev, sev) + ' (' + str(len(grp)) + ')')
              for i in grp:
                  comp = i.get('component', '').split(':')[-1]
                  line_num = str(i.get('line', '?'))
                  msg = i.get('message', '')
                  rule = i.get('rule', '')
                  lines.append('- `' + comp + ':' + line_num + '` -- ' + msg + ' (`' + rule + '`)')
              lines.append('')
          if not any(by_sev.get(s) for s in sev_order):
              lines.append('Aucun probleme detecte !')
          lines.append('> Fermer cette issue une fois les corrections appliquees')
          print('\n'.join(lines))
          PYEOF

          BODY=$(python3 /tmp/format_sonar.py)

          EXISTING=$(gh issue list --label "sonarcloud-report" \
            --state open --json number \
            --jq 'if length > 0 then .[0].number | tostring else "" end' 2>/dev/null)

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body "$BODY"
            echo "Issue #$EXISTING mise a jour"
          else
            gh issue create \
              --title "SonarCloud Report" \
              --body "$BODY" \
              --label "sonarcloud-report"
            echo "Issue creee"
          fi
